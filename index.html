<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حجز موعد ملاك رسن</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="page">

  <section class="hero">
    <div class="logos">
      <img src="logo-fursan.png" alt="الفرسان">
      <div class="line"></div>
      <img src="logo.png" alt="رسن">
      <div class="line"></div>
      <img src="logo-njoom.png" alt="نجوم السلام">
    </div>

    <h1>حجز موعد ملاك رسن</h1>
    <p>يسعدنا دعوتكم لحضور فعالية ملاك رسن، اختر الموعد المناسب وأكمل بياناتك لتأكيد الحضور.</p>

    <div class="hero-tags">
      <a href="https://maps.app.goo.gl/8xNA6Y2S74TzhMPK8?g_st=ic" target="_blank">موقع الفعالية</a>
      <span>28 يونيو - 1 يوليو 2026</span>
    </div>
  </section>

  <section class="booking-card">

    <div class="steps">
      <div class="step active">١ اختر اليوم</div>
      <div class="step">٢ اختر الوقت</div>
      <div class="step">٣ أكد بياناتك</div>
    </div>

    <h2>اختر اليوم</h2>
    <div class="cards day-cards">
      <button type="button" data-day="الأحد 28 يونيو">الأحد <strong>28</strong><small>يونيو</small></button>
      <button type="button" data-day="الإثنين 29 يونيو">الإثنين <strong>29</strong><small>يونيو</small></button>
      <button type="button" data-day="الثلاثاء 30 يونيو">الثلاثاء <strong>30</strong><small>يونيو</small></button>
      <button type="button" data-day="الأربعاء 1 يوليو">الأربعاء <strong>1</strong><small>يوليو</small></button>
    </div>

    <h2>اختر الوقت</h2>
    <div class="cards time">
      <button type="button" data-time="5:00 - 6:00 مساءً">5:00 - 6:00 <small>مساءً</small></button>
      <button type="button" data-time="6:00 - 7:00 مساءً">6:00 - 7:00 <small>مساءً</small></button>
      <button type="button" data-time="7:00 - 8:00 مساءً">7:00 - 8:00 <small>مساءً</small></button>
      <button type="button" data-time="8:00 - 9:00 مساءً">8:00 - 9:00 <small>مساءً</small></button>
      <button type="button" data-time="9:00 - 10:00 مساءً">9:00 - 10:00 <small>مساءً</small></button>
    </div>

    <p class="note">بعد اختيار اليوم والوقت ستظهر نافذة تأكيد البيانات.</p>

  </section>

</main>

<div class="modal" id="bookingModal">
  <div class="modal-card">
    <h2>تأكيد الموعد</h2>
    <p class="selected-date" id="selectedText"></p>

    <form>
      <label>الاسم الكامل</label>
      <input type="text" id="fullName" placeholder="الاسم كما في الهوية">

      <label>رقم الجوال</label>
      <input type="tel" id="phone" placeholder="05XXXXXXXX">

      <label>رقم الفيلا</label>
      <input type="text" id="villa" placeholder="مثال: A-12">

      <label>البريد الإلكتروني (اختياري)</label>
      <input type="email" id="email" placeholder="example@email.com">

      <div class="modal-actions">
        <button class="submit" type="button">تأكيد الموعد</button>
        <button class="cancel" type="button" onclick="closeModal()">إلغاء</button>
      </div>
    </form>
  </div>
</div>

<script>
let selectedDay = "";
let selectedTime = "";

const dayButtons = document.querySelectorAll('.day-cards button');
const timeButtons = document.querySelectorAll('.time button');
const modal = document.getElementById('bookingModal');
const selectedText = document.getElementById('selectedText');

dayButtons.forEach(button => {
  button.addEventListener('click', () => {
    dayButtons.forEach(btn => btn.classList.remove('selected'));
    button.classList.add('selected');
    selectedDay = button.dataset.day;
  });
});

timeButtons.forEach(button => {
  button.addEventListener('click', () => {
    if(!selectedDay){
      alert("يرجى اختيار اليوم أولاً");
      return;
    }

    timeButtons.forEach(btn => btn.classList.remove('selected'));
    button.classList.add('selected');
    selectedTime = button.dataset.time;

    selectedText.textContent = `${selectedDay} • ${selectedTime}`;
    modal.classList.add('show');
  });
});

function closeModal(){
  modal.classList.remove('show');
}
</script>

</body>
</html>
