<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حجز موعد ملاك رسن</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="page">

  <section class="hero">
    <div class="logos">
      <img src="logo-njoom.png" class="logo-njoom" alt="نجوم السلام">
      <div class="line"></div>
      <img src="logo.png" class="logo-rasn" alt="رسن">
      <div class="line"></div>
      <img src="logo-fursan.png" class="logo-fursan" alt="الفرسان">
    </div>

    <h1>حجز موعد ملاك رسن</h1>
    <p>يسعدنا دعوتكم لحضور فعالية ملاك رسن، اختر اليوم المناسب وأكمل بياناتك لتأكيد الحضور.</p>

    <div class="hero-tags">
      <a href="https://maps.app.goo.gl/8xNA6Y2S74TzhMPK8?g_st=ic" target="_blank">موقع الفعالية</a>
      <span>28 يونيو - 1 يوليو 2026</span>
      <span>5:00 مساءً - 10:00 مساءً</span>
    </div>
  </section>

  <section class="booking-card">

    <div class="steps">
      <div class="step active">١ اختر اليوم</div>
      <div class="step">٢ أدخل بياناتك</div>
    </div>

    <h2>اختر اليوم</h2>

    <div class="cards day-cards">
      <input type="radio" name="day" id="day1" disabled>

<label for="day1" class="full-booked">
  الأحد
  <strong>28</strong>
  <small>يونيو</small>
  <span class="booking-status"> اكتملت الحجوزات</span>
</label>
     <input type="radio" name="day" id="day2" disabled>

<label for="day2" class="full-booked">
  الإثنين
  <strong>29</strong>
  <small>يونيو</small>
  <span class="booking-status">اكتملت الحجوزات</span>
</label>

      <input type="radio" name="day" id="day3">
      <label for="day3">
        الثلاثاء
        <strong>30</strong>
        <small>يونيو</small>
      </label>

      <input type="radio" name="day" id="day4">
      <label for="day4">
        الأربعاء
        <strong>1</strong>
        <small>يوليو</small>
      </label>
    </div>

    <p class="note">بعد اختيار اليوم، أكمل بياناتك لتأكيد الحضور.</p>

    <div class="form-card">
      <h2>بيانات الحضور</h2>

      <form>
        <label>الاسم الكامل <span>*</span></label>
        <input type="text" placeholder="الاسم كما في الهوية" required>

        <label>رقم الجوال <span>*</span></label>
        <input type="tel" placeholder="05XXXXXXXX" required>

        <label>رقم الفيلا <span>*</span></label>
        <input type="text" placeholder="مثال: 57" required>

        <label>البريد الإلكتروني <small>(اختياري)</small></label>
        <input type="email" placeholder="example@email.com">

        <button type="submit">تأكيد الموعد</button>
      </form>
    </div>

  </section>

</main>
<script src="script.js"></script>
</body>
</html>
