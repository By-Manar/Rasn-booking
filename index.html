<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حجز موعد ملاك رسن</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="page">

  <section class="hero">

    <div class="logos">
      <img src="logo-fursan.png" alt="الفرسان">
      <div class="line"></div>
      <img src="logo-rasn.png" alt="رسن">
      <div class="line"></div>
      <img src="logo-njoom.png" alt="نجوم السلام">
    </div>

    <h1>حجز موعد ملاك رسن</h1>
    <p>يسعدنا دعوتكم لحضور فعالية ملاك رسن، اختر الموعد المناسب وأكمل بياناتك لتأكيد الحضور.</p>

    <div class="hero-tags">
      <a href="https://maps.app.goo.gl/8xNA6Y2S74TzhMPK8?g_st=ic" target="_blank">📍 موقع الفعالية</a>
      <span>📅 28 يونيو - 1 يوليو 2026</span>
    </div>
  </section>

  <section class="booking-card">

    <div class="steps">
      <div class="step active">١ اختر اليوم</div>
      <div class="step">٢ اختر الوقت</div>
      <div class="step">٣ أكد بياناتك</div>
    </div>

    <h2>اختر اليوم</h2>
    <div class="cards">
      <button>الأحد <strong>28</strong><small>يونيو</small></button>
      <button>الإثنين <strong>29</strong><small>يونيو</small></button>
      <button>الثلاثاء <strong>30</strong><small>يونيو</small></button>
      <button>الأربعاء <strong>1</strong><small>يوليو</small></button>
    </div>

    <h2>اختر الوقت</h2>
    <div class="cards time">
      <button>5:00 - 6:00 <small>مساءً</small></button>
      <button>6:00 - 7:00 <small>مساءً</small></button>
      <button>7:00 - 8:00 <small>مساءً</small></button>
      <button>8:00 - 9:00 <small>مساءً</small></button>
      <button>9:00 - 10:00 <small>مساءً</small></button>
    </div>

    <h2>بيانات الحضور</h2>

    <form>
      <label>الاسم الكامل</label>
      <input type="text">

      <label>رقم الجوال</label>
      <input type="tel" placeholder="05XXXXXXXX">

      <label>رقم الفيلا</label>
      <input type="text">

      <label>البريد الإلكتروني (اختياري)</label>
      <input type="email">

      <button class="submit" type="button">تأكيد الموعد</button>
    </form>

  </section>

</main>

</body>
</html>
